spring:
  datasource:
    url: jdbc:mysql://localhost:3306/takehome
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
server:
  port: 8080

jwt:
  secret: take-home-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha
  expiration-ms: 86400000  # 24 hours

aws:
  region: us-east-1
  s3:
    bucket: takehome-files
    endpoint: http://localhost:4566
  sqs:
    queue-url: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/takehome-jobs
    endpoint: http://localhost:4566

worker:
  enabled: false
  poll-interval-ms: 1000
  max-messages: 10
  visibility-timeout-seconds: 30

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  currency: usd
