spring:
  datasource:
    url: jdbc:h2:mem:integrationdb;DB_CLOSE_DELAY=-1;MODE=MYSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: H2
  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: test-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256
  expiration-ms: 86400000

aws:
  region: us-east-1
  s3:
    bucket: test-bucket
    endpoint: http://localhost:4566
  sqs:
    # Overridden at runtime by @DynamicPropertySource
    queue-url: http://localhost:9324/000000000000/test-jobs
    endpoint: http://localhost:9324

worker:
  enabled: true
  poll-interval-ms: 500
  max-messages: 10
  visibility-timeout-seconds: 30
